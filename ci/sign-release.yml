# Sign a published GitHub Release with a BetterUpdater manifest.
#
# Decoupled from the build: triggers when a release is PUBLISHED, downloads the
# .dmg/.zip assets already attached to it, signs them into a manifest, verifies
# against the PINNED public key, and uploads the manifest + signature back to
# the same release. Works no matter how the .dmg was produced/uploaded.
#
# Install: copy to `.github/workflows/sign-release.yml` in the repo that hosts
# the releases your app's updater points at (its GitHubUpdaterConfig owner/repo).
#
# Required secret:
#   BETTERUPDATER_PRIVATE_KEY  — base64 Ed25519 private key from `betterupdater keygen`
# Edit the env block per app.

name: sign-release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sign:
    runs-on: macos-14
    env:
      OWNER: rokartur
      REPO: BetterAudio                       # <-- this repo's owner/repo (updater target)
      BUNDLE_ID: pro.betteraudio.BetterAudio   # <-- app bundle id
      TEAM_ID: YOURTEAMID                      # <-- Apple Developer Team ID
      PINNED_PUBLIC_KEY: duIBPTDie9dBTKqijWVxsVHZ89AMuorAz04gF6K+TUQ=  # <-- pinned in the app
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${{ github.repository }}" \
            --pattern '*.dmg' --pattern '*.zip' --dir dist || true
          ls -la dist

      - name: Build betterupdater CLI
        run: |
          git clone --depth 1 https://github.com/rokartur/BetterUpdater.git /tmp/betterupdater
          (cd /tmp/betterupdater && swift build -c release --product betterupdater)
          echo "BU=/tmp/betterupdater/.build/release/betterupdater" >> "$GITHUB_ENV"

      - name: Sign manifest
        env:
          BETTERUPDATER_PRIVATE_KEY: ${{ secrets.BETTERUPDATER_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSETS=$(printf -- '--asset %s ' dist/*.dmg dist/*.zip 2>/dev/null)
          [ -z "$ASSETS" ] && { echo "No .dmg/.zip assets on release"; exit 1; }
          "$BU" sign \
            --owner "$OWNER" --repo "$REPO" \
            --bundle-id "$BUNDLE_ID" --team-id "$TEAM_ID" \
            --version "$VERSION" \
            $ASSETS \
            --out dist/betterupdater-manifest.json

      - name: Verify before upload (fail-closed guard)
        run: |
          ASSETS=$(printf -- '--asset %s ' dist/*.dmg dist/*.zip 2>/dev/null)
          "$BU" verify \
            --public-key "$PINNED_PUBLIC_KEY" \
            --manifest dist/betterupdater-manifest.json \
            $ASSETS

      - name: Upload manifest + signature to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/betterupdater-manifest.json \
            dist/betterupdater-manifest.json.sig \
            --repo "${{ github.repository }}" --clobber
